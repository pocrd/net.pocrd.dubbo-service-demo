spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dubbo_demo?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath*:autogen/mapper/*.xml,classpath*:mapper/*.xml
  type-aliases-package: com.pocrd.dubbo_demo.dao.autogen.entity

# 禁用 Dubbo
dubbo:
  enabled: false
  registry:
    address: N/A
  protocol:
    name: dubbo
    port: -1

# 禁用 Nacos
spring.cloud.nacos.discovery.enabled: false
spring.cloud.nacos.config.enabled: false
