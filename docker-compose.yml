services:
  dubbo-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: dubbo-demo-service
    container_name: dubbo-demo-service
    ports:
      - "50051:50051"
      - "50052:50052"
    environment:
      - DUBBO_IP_TO_REGISTRY
    restart: unless-stopped
    volumes:
      - maven-repo:/root/.m2

volumes:
  maven-repo:
    driver: local

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
