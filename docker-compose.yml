services:
  dubbo-service:
    build: .
    container_name: dubbo-triple-service
    ports:
      - "9090:9090"
      - "50051:50051"
    environment:
      - DUBBO_REGISTRY_ADDRESS=nacos://nacos:8848
      - SERVER_PORT=9090
    networks:
      - higress-net

networks:
  higress-net:
    driver: bridge
