services:
  dubbo-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: service-demo-dubbo-service
    container_name: dubbo-demo-service
    ports:
      - "50051:50051"
      - "50052:50052"
    environment:
      - DUBBO_REGISTRY_ADDRESS=nacos://172.24.137.195:30848
      - DUBBO_CONFIG_CENTER=nacos://172.24.137.195:30848
      - DUBBO_METADATA_REPORT_ADDRESS=nacos://172.24.137.195:30848
      # MySQL database configuration
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=service_demo
      - MYSQL_USERNAME=demo
      - MYSQL_PASSWORD=demo123
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      # 挂载 Maven 本地仓库，加速依赖下载
      - maven-repo:/root/.m2

volumes:
  maven-repo:
    driver: local
