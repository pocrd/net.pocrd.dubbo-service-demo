# Server configuration
server:
  port: 9090

# Spring configuration
spring:
  application:
    name: dubbo-demo-service

# Dubbo configuration
dubbo:
  application:
    name: ${spring.application.name}
    # Enable QoS for management
    qos-enable: true
    qos-accept-foreign-ip: true
  registry:
    address: nacos://nacos-server:8848
    # Additional parameters for Nacos
    parameters:
      namespace: public
      group: DEFAULT_GROUP
  protocols:
    tri:
      name: tri
      port: 50051
      serialization: fastjson2
    dubbo:
      name: dubbo
      port: 50052
      serialization: fury
  # 指定 tri 为默认协议（provider 和 consumer 默认使用）
  provider:
    protocol: tri
  consumer:
    protocol: tri
  metadata-report:
    address: nacos://nacos-server:8848

# Logging configuration
logging:
  level:
    root: INFO
    org.apache.dubbo: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
