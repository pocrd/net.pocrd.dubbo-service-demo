# Spring configuration
spring:
  application:
    name: dubbo-demo-service

# Dubbo configuration
dubbo:
  registry:
    empty-protection: true
  application:
    name: ${spring.application.name}
    # Enable QoS for management
    qos-enable: true
    qos-accept-foreign-ip: true
  registries:
    nacos-internal:
      address: ${DUBBO_REGISTRY_ADDRESS:nacos://nacos-server:8848}
      group: INTERNAL-GROUP
    nacos-public:
      address: ${DUBBO_REGISTRY_ADDRESS:nacos://nacos-server:8848}
      # group 名称不要包含下划线，否则由于DNS-1123 标签标准要求，在higress中会自动转换为短横线连接
      group: PUBLIC-GROUP
  protocols:
    tri:
      name: tri
      port: 50051
      serialization: fastjson2
      registry-ids: nacos-public
    dubbo:
      name: dubbo
      port: 50052
      serialization: fury
      registry-ids: nacos-internal
  metadata-report:
    address: ${DUBBO_METADATA_REPORT_ADDRESS:nacos://nacos-server:8848}
  config-center:
    address: ${DUBBO_CONFIG_CENTER:nacos://nacos-server:8848}

# Logging configuration
logging:
  level:
    root: INFO
    org.apache.dubbo: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
