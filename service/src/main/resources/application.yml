# Server configuration
server:
  port: 9090

# Spring configuration
spring:
  application:
    name: dubbo-demo-service

# Dubbo configuration
dubbo:
  application:
    name: ${spring.application.name}
    # Enable QoS for management
    qos-enable: true
    qos-accept-foreign-ip: true
  registry:
    address: nacos://nacos-service:8848  # 修改为实际的Nacos服务网络名称
    # Additional parameters for Nacos
    parameters:
      namespace: public
      group: DEFAULT_GROUP
  protocol:
    name: tri
    port: 50051
  provider:
    timeout: 60000
    retries: 0
  consumer:
    timeout: 60000
    retries: 0
  metadata-report:
    address: nacos://nacos-service:8848  # 修改为实际的Nacos服务网络名称

# Logging configuration
logging:
  level:
    root: INFO
    org.apache.dubbo: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
